version: '3.8'

services:
  backend:
    build:
      context: ../../../../backend
      dockerfile: ../../.docker/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../../../backend/.env
    volumes:
      - ../../../../backend:/var/www/html
      - ../../../../backend/.env:/var/www/html/.env
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      - RUN_MIGRATIONS=true
      - FORCE_MIGRATION=true
    depends_on:
      database:
        condition: service_healthy
    networks:
      - paymentform-local
    ports:
      - "8000:8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.pf-backend.rule=Host(`api.local.paymentform.com`)
      - traefik.http.routers.pf-backend.entrypoints=web
      - traefik.http.routers.pf-backend.service=pf-backend
      - traefik.http.services.pf-backend.loadbalancer.server.port=8000

  database:
    image: postgres:17
    restart: unless-stopped
    env_file: ../../../../backend/.env
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_DATABASE:-shopper_backend}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - paymentform-local
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-shopper_backend}" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  paymentform-local:
    driver: bridge